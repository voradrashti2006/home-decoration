<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Cards</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="product-section">

        <!-- Card 1 -->
        <div class="product-card">
            <div class="product-card">

                <span class="sale">Sale</span>

                <div class="img-box">
                    <img src="https://images.unsplash.com/photo-1519710164239-da123dc03ef4" alt="">
                    <div class="overlay">
                        <a href="#">ADD TO CART</a>
                    </div>
                </div>

                <h3>SILVER LAMP</h3>
                <p class="category">Home</p>
                <p class="price">
                    <span class="old">$100.00</span>
                    <span class="new">$70.00</span>
                </p>

            </div>
        </div>

        <!-- Card 2 -->
        <div class="product-card">
            <span class="sale">Sale</span>
            <img src="https://images.unsplash.com/photo-1519710164239-da123dc03ef4" alt="">
            <h3>SILVER LAMP</h3>
            <p class="category">Home</p>
            <p class="price">
                <span class="old">$100.00</span>
                <span class="new">$70.00</span>
            </p>
        </div>

        <!-- Card 3 -->
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6" alt="">
            <h3>FLOWERS & CANDLES</h3>
            <p class="category">Home</p>
            <p class="price">$30.00</p>
        </div>

        <!-- Card 4 -->
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348" alt="">
            <h3>COFFEE CUP</h3>
            <p class="category">Home</p>
            <p class="price">$40.00</p>
        </div>

    </section>

</body>

</html>
